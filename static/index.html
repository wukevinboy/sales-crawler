<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務員 AI 對練 — 競品調研</title>
<style>
:root {
  --bg:       #080d1a;
  --surface:  #0f172a;
  --raised:   #1a2540;
  --border:   #1e3a5f22;
  --line:     #1e3060;
  --accent:   #3b82f6;
  --accent2:  #60a5fa;
  --text:     #e2e8f0;
  --muted:    #94a3b8;
  --dim:      #475569;
  --green:    #10b981;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --sidebar-w: 300px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 24px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.topbar-logo { font-size: 14px; font-weight: 700; letter-spacing: .06em; color: var(--accent2); }
.topbar-sub  { font-size: 12px; color: var(--dim); }
.topbar-stats { margin-left: auto; display: flex; gap: 24px; }
.stat-pill { font-size: 11px; color: var(--muted); }
.stat-pill span { color: var(--text); font-weight: 600; font-size: 13px; margin-right: 4px; }

/* LAYOUT */
.layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-hd {
  padding: 14px 16px 10px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dim);
  border-bottom: 1px solid var(--line);
}
.sidebar-list { overflow-y: auto; flex: 1; }
.sidebar-list::-webkit-scrollbar { width: 4px; }
.sidebar-list::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 4px; }

.comp-card {
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  transition: background 150ms;
}
.comp-card:hover { background: var(--raised); }
.comp-card.active { background: #1a2f5a; border-left: 3px solid var(--accent); }

.comp-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.comp-url  { font-size: 11px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.comp-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }

.platform-badge {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 2px 7px; border-radius: 4px;
  background: var(--raised); color: var(--muted);
}
.platform-badge .stars { font-size: 11px; font-weight: 700; }
.stars.g { color: var(--green); }
.stars.a { color: var(--amber); }
.stars.r { color: var(--red); }
.no-app-badge {
  font-size: 10px; padding: 2px 7px; border-radius: 4px;
  background: #1e293b; color: var(--dim);
}

/* DETAIL */
.detail { display: flex; flex-direction: column; overflow: hidden; }
.detail-hd { padding: 16px 24px 0; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.detail-title { font-size: 20px; font-weight: 700; color: var(--text); }
.detail-url   { font-size: 12px; color: var(--accent2); margin-top: 2px; }
.detail-desc  { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; max-height: 48px; overflow: hidden; }

.tabs { display: flex; gap: 2px; margin-top: 12px; }
.tab-btn {
  padding: 8px 18px; font-size: 13px; font-weight: 500;
  color: var(--dim); background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  transition: color 150ms, border-color 150ms;
}
.tab-btn:hover { color: var(--muted); }
.tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent2); }

.tab-body { flex: 1; overflow-y: auto; padding: 20px 24px 32px; }
.tab-body::-webkit-scrollbar { width: 4px; }
.tab-body::-webkit-scrollbar-thumb { background: var(--raised); border-radius: 4px; }

.tab-pane { display: none; }
.tab-pane.visible { display: block; }

/* OVERVIEW */
.platform-section { margin-bottom: 28px; }
.platform-title {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--dim); margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.metrics-row { display: flex; gap: 14px; flex-wrap: wrap; }
.metric-box {
  background: var(--raised); border: 1px solid var(--line);
  border-radius: 8px; padding: 12px 18px; min-width: 110px;
}
.metric-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: .08em; }
.metric-val   { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 4px; }
.metric-val.g { color: var(--green); }
.metric-val.a { color: var(--amber); }
.metric-val.r { color: var(--red); }
.metric-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* REVIEWS */
.review-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 11px; color: var(--dim); margin-right: 4px; }
.filter-btn {
  padding: 4px 14px; font-size: 12px; font-weight: 500;
  border-radius: 20px; border: 1px solid var(--line);
  background: transparent; color: var(--muted); cursor: pointer;
  transition: all 150ms;
}
.filter-btn.active, .filter-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

.review-count-info { font-size: 12px; color: var(--dim); margin-bottom: 14px; }

.review-list { display: flex; flex-direction: column; gap: 10px; }
.review-item {
  background: var(--raised); border: 1px solid var(--line);
  border-radius: 8px; padding: 14px 16px;
}
.review-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.review-stars { display: flex; gap: 2px; }
.star { font-size: 13px; }
.star.filled { color: var(--amber); }
.star.empty  { color: var(--dim); }
.review-author { font-size: 12px; font-weight: 600; color: var(--text); }
.review-date   { font-size: 11px; color: var(--dim); }
.review-platform {
  margin-left: auto; font-size: 10px; padding: 2px 8px;
  border-radius: 4px; background: var(--surface); color: var(--dim);
}
.review-content { font-size: 13px; color: var(--muted); line-height: 1.65; }

/* ANALYSIS */
.analysis-block {
  background: var(--raised); border: 1px solid var(--line);
  border-radius: 10px; padding: 18px 20px; margin-bottom: 16px;
}
.analysis-block-title {
  font-size: 11px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: var(--accent2); margin-bottom: 12px;
}
.analysis-text { font-size: 13px; color: var(--muted); line-height: 1.75; white-space: pre-wrap; }

.keyword-section { margin-top: 4px; }
.keyword-label  { font-size: 11px; font-weight: 700; letter-spacing: .06em; margin-bottom: 8px; margin-top: 14px; }
.keyword-label.pos { color: var(--green); }
.keyword-label.neg { color: var(--red); }
.keyword-chips  { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { font-size: 12px; padding: 4px 12px; border-radius: 20px; font-weight: 500; }
.chip.pos { background: #064e3b; color: #6ee7b7; }
.chip.neg { background: #450a0a; color: #fca5a5; }

.stat-row { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
.stat-item { font-size: 12px; color: var(--muted); }
.stat-item strong { color: var(--text); }

/* 空狀態 */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; color: var(--dim); gap: 10px;
}
.empty-icon { font-size: 40px; opacity: .4; }
.empty-text { font-size: 14px; }
.loading { color: var(--dim); font-size: 13px; text-align: center; padding: 48px; }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">競品雷達</div>
  <div class="topbar-sub">業務員 AI 對練 · 市場調研</div>
  <div class="topbar-stats" id="topbarStats"></div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-hd">競品列表 <span id="compCount" style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0"></span></div>
    <div class="sidebar-list" id="sidebarList"></div>
  </aside>

  <section class="detail">
    <div id="detailPanel" style="height:100%;display:flex;flex-direction:column">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <div class="empty-text">點選左側競品查看詳細分析</div>
      </div>
    </div>
  </section>
</div>

<script>
const PLATFORM_ZH   = {app_store:'App Store (iOS)', google_play:'Google Play (Android)', product_hunt:'Product Hunt'};
const PLATFORM_ICON = {app_store:'🍎', google_play:'🤖', product_hunt:'🔶'};

let allItems   = [];
let allReports = {};
let activeId   = null;
let activeTab  = 'overview';
let revFilter  = 'all';

function ratingClass(r) {
  if (r == null) return '';
  return r >= 4 ? 'g' : r >= 3 ? 'a' : 'r';
}

function starHtml(n) {
  let h = '';
  const filled = Math.round(n || 0);
  for (let i = 1; i <= 5; i++)
    h += `<span class="star ${i <= filled ? 'filled' : 'empty'}">★</span>`;
  return h;
}

function bestRating(apps) {
  if (!apps || !apps.length) return null;
  const rs = apps.map(a => a.rating).filter(r => r != null);
  return rs.length ? Math.max(...rs) : null;
}

function inferName(title, url) {
  if (title) {
    let t = title;
    for (const sep of ['|','-','–',':','·']) {
      if (t.includes(sep)) { t = t.split(sep)[0].trim(); break; }
    }
    if (t.split(' ').length > 4)
      return url.replace(/^https?:\/\//, '').replace(/^www\./, '').split('.')[0]
               .replace(/^(.)/, c => c.toUpperCase());
    return t;
  }
  return url.replace(/^https?:\/\//, '').replace(/^www\./, '').split('.')[0]
           .replace(/^(.)/, c => c.toUpperCase());
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function loadList() {
  const res  = await fetch('/results?limit=100');
  const data = await res.json();
  allItems = data.items.sort((a, b) => {
    const ra = bestRating(a.apps), rb = bestRating(b.apps);
    if (ra == null && rb == null) return 0;
    if (ra == null) return 1; if (rb == null) return -1;
    return rb - ra;
  });

  document.getElementById('compCount').textContent = `(${allItems.length})`;

  const totalRevs = data.items.reduce((s, it) =>
    s + (it.apps||[]).reduce((ss, a) => ss + (a.review_count||0), 0), 0);
  const withApps = data.items.filter(it => it.apps && it.apps.length).length;

  document.getElementById('topbarStats').innerHTML = `
    <div class="stat-pill"><span>${allItems.length}</span> 個競品</div>
    <div class="stat-pill"><span>${withApps}</span> 有 App</div>
    <div class="stat-pill"><span>${totalRevs.toLocaleString()}</span> 則評分</div>
  `;
  renderSidebar();
}

function renderSidebar() {
  document.getElementById('sidebarList').innerHTML = allItems.map(item => {
    const badgeHtml = item.apps && item.apps.length
      ? item.apps.map(a => {
          const c = ratingClass(a.rating);
          return `<div class="platform-badge">${PLATFORM_ICON[a.platform]||''} <span class="stars ${c}">${a.rating != null ? a.rating.toFixed(1) : 'N/A'}</span></div>`;
        }).join('')
      : '<span class="no-app-badge">純 Web 服務</span>';
    return `<div class="comp-card ${item.id === activeId ? 'active' : ''}" onclick="selectComp('${item.id}')">
      <div class="comp-name">${esc(inferName(item.title, item.url))}</div>
      <div class="comp-url">${esc(item.url)}</div>
      <div class="comp-meta">${badgeHtml}</div>
    </div>`;
  }).join('');
}

async function selectComp(id) {
  activeId = id; activeTab = 'overview'; revFilter = 'all';
  renderSidebar();
  document.getElementById('detailPanel').innerHTML = '<div class="loading">載入中…</div>';

  if (!allReports[id]) {
    const res = await fetch(`/results/${id}/report`);
    allReports[id] = await res.json();
  }
  renderDetail(allReports[id]);
}

function renderDetail(report) {
  const item = allItems.find(i => i.id === activeId);
  const name = inferName(item.title, item.url);
  const latestReport = report.reports && report.reports[0];
  const totalFetched = (report.apps||[]).reduce((s, a) => s + a.reviews.length, 0);

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-hd">
      <div class="detail-title">${esc(name)}</div>
      <div class="detail-url"><a href="${esc(report.url)}" target="_blank" style="color:var(--accent2);text-decoration:none">${esc(report.url)}</a></div>
      ${item.description ? `<div class="detail-desc">${esc(item.description)}</div>` : ''}
      <div class="tabs">
        <button class="tab-btn ${activeTab==='overview'?'active':''}" onclick="switchTab('overview')">總覽</button>
        <button class="tab-btn ${activeTab==='reviews'?'active':''}" onclick="switchTab('reviews')">用戶評論${totalFetched ? ` (${totalFetched})` : ''}</button>
        <button class="tab-btn ${activeTab==='analysis'?'active':''}" onclick="switchTab('analysis')">市場分析</button>
      </div>
    </div>
    <div class="tab-body">
      <div id="tab-overview" class="tab-pane ${activeTab==='overview'?'visible':''}">
        ${renderOverview(report)}
      </div>
      <div id="tab-reviews" class="tab-pane ${activeTab==='reviews'?'visible':''}">
        ${renderReviews(report)}
      </div>
      <div id="tab-analysis" class="tab-pane ${activeTab==='analysis'?'visible':''}">
        ${renderAnalysis(report, latestReport)}
      </div>
    </div>
  `;
}

function renderOverview(report) {
  if (!report.apps || !report.apps.length) {
    return `<div style="color:var(--dim);font-size:14px;padding:8px 0;line-height:2">
      此競品尚未找到對應的行動 App。<br>
      <span style="color:var(--accent2)">目前為純 Web 服務。</span>
    </div>`;
  }
  return report.apps.map(app => {
    const c = ratingClass(app.rating);
    return `<div class="platform-section">
      <div class="platform-title">
        <span>${PLATFORM_ICON[app.platform]||''}</span>
        ${PLATFORM_ZH[app.platform]||app.platform}
      </div>
      <div class="metrics-row">
        <div class="metric-box">
          <div class="metric-label">平均評分</div>
          <div class="metric-val ${c}">${app.rating != null ? app.rating.toFixed(2) : '—'}</div>
          <div class="metric-sub">滿分 5 分</div>
        </div>
        <div class="metric-box">
          <div class="metric-label">評分人數</div>
          <div class="metric-val">${app.review_count != null ? app.review_count.toLocaleString() : '—'}</div>
          <div class="metric-sub">累積評分數</div>
        </div>
        ${app.installs ? `<div class="metric-box">
          <div class="metric-label">下載量</div>
          <div class="metric-val" style="font-size:15px">${esc(app.installs)}</div>
          <div class="metric-sub">安裝次數</div>
        </div>` : ''}
        <div class="metric-box">
          <div class="metric-label">已爬取</div>
          <div class="metric-val">${app.reviews.length}</div>
          <div class="metric-sub">則評論</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderReviews(report) {
  if (!report.apps || !report.apps.length)
    return `<div style="color:var(--dim);font-size:13px">此競品為純 Web 服務，無行動 App 評論。</div>`;

  const all = [];
  report.apps.forEach(app => {
    app.reviews.forEach(r => all.push({...r, platform: app.platform, appName: app.app_name}));
  });

  if (!all.length)
    return `<div style="color:var(--dim);font-size:13px">尚無評論資料。</div>`;

  const platforms = [...new Set(all.map(r => r.platform))];
  const filterBtns = ['all', ...platforms].map(p =>
    `<button class="filter-btn ${revFilter===p?'active':''}" onclick="setRevFilter('${p}')">
      ${p === 'all' ? '全部' : (PLATFORM_ZH[p]||p)}
    </button>`
  ).join('');

  const filtered = revFilter === 'all' ? all : all.filter(r => r.platform === revFilter);
  const items = filtered.map(r => `
    <div class="review-item">
      <div class="review-top">
        <div class="review-stars">${starHtml(r.rating)}</div>
        <div class="review-author">${esc(r.author || '匿名')}</div>
        ${r.review_date ? `<div class="review-date">${esc(r.review_date)}</div>` : ''}
        <div class="review-platform">${PLATFORM_ICON[r.platform]||''} ${PLATFORM_ZH[r.platform]||r.platform}</div>
      </div>
      <div class="review-content">${esc(r.content || '')}</div>
    </div>`
  ).join('');

  return `
    <div class="review-filters">
      <span class="filter-label">篩選平台：</span>
      ${filterBtns}
    </div>
    <div class="review-count-info">顯示 <strong style="color:var(--text)">${filtered.length}</strong> 則 / 共 ${all.length} 則評論</div>
    <div class="review-list">${items}</div>`;
}

function renderAnalysis(report, latestReport) {
  if (!latestReport)
    return `<div style="color:var(--dim);font-size:13px">尚無分析報告。</div>`;

  const rh  = latestReport.review_highlights || {};
  const pos = (rh.positive || []).slice(0, 12);
  const neg = (rh.negative || []).slice(0, 12);
  let html  = '';

  if (latestReport.competitor_summary) {
    html += `<div class="analysis-block">
      <div class="analysis-block-title">競品分析摘要</div>
      <div class="analysis-text">${esc(latestReport.competitor_summary)}</div>
    </div>`;
  }

  if (latestReport.market_insight) {
    html += `<div class="analysis-block">
      <div class="analysis-block-title">市場洞察</div>
      <div class="analysis-text">${esc(latestReport.market_insight)}</div>
    </div>`;
  }

  if (pos.length || neg.length) {
    html += `<div class="analysis-block">
      <div class="analysis-block-title">用戶評論情緒分析</div>
      ${rh.avg_rating != null ? `<div class="stat-row">
        <div class="stat-item">平均評分 <strong>${rh.avg_rating}</strong></div>
        <div class="stat-item">分析評論數 <strong>${rh.total}</strong> 則</div>
      </div>` : ''}
      <div class="keyword-section">
        ${pos.length ? `<div class="keyword-label pos">▲ 正面高頻關鍵字</div>
        <div class="keyword-chips">${pos.map(w => `<span class="chip pos">${esc(w)}</span>`).join('')}</div>` : ''}
        ${neg.length ? `<div class="keyword-label neg">▼ 負面高頻關鍵字</div>
        <div class="keyword-chips">${neg.map(w => `<span class="chip neg">${esc(w)}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  }

  return html || `<div style="color:var(--dim);font-size:13px">分析進行中。</div>`;
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.getAttribute('onclick').includes(`'${tab}'`)));
  document.querySelectorAll('.tab-pane').forEach(p =>
    p.classList.toggle('visible', p.id === `tab-${tab}`));
}

function setRevFilter(filter) {
  revFilter = filter;
  const report = allReports[activeId];
  if (report) document.getElementById('tab-reviews').innerHTML = renderReviews(report);
}

loadList();
</script>
</body>
</html>
